name: Lint
on:
  push:

jobs:
  lint:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - run: npx -p prettier prettier --check .

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
